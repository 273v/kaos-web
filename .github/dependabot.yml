version: 2
updates:
  # Python deps via PEP 621 / uv.lock. Keep the cooldown aligned with
  # [tool.uv].exclude-newer so Dependabot only proposes lockable updates.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    cooldown:
      default-days: 3
      exclude:
        - "kaos-*"
    open-pull-requests-limit: 5
    groups:
      deps-minor:
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions-all:
        patterns: ["*"]
