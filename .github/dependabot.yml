version: 2
updates:
  # ────────────── GitHub Actions ──────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    groups:
      actions:
        patterns: ["*"]
    labels: ["type:deps", "ci"]
    commit-message:
      prefix: "ci(deps)"

  # ────────────── Python (uv-managed via pyproject.toml) ──────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    groups:
      python:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      python-major:
        patterns: ["*"]
        update-types: ["major"]
    open-pull-requests-limit: 5
    labels: ["type:deps"]
    commit-message:
      prefix: "deps"
