name: test

# Standard `test` lane (per
# kaos-modules/docs/oss/40-ci-cd/runner-cost-reduction-plan.md):
# normal unit tests (not live, not network, not slow) on Linux Python
# 3.13. Cross-OS and preview-Python coverage live in the `compat` lane
# on a weekly schedule.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test
    runs-on: kaos-x64-16core
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: test-linux-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Run tests
        run: |
          uv run pytest \
            -m "not live and not network and not slow and not integration" \
            --cov=kaos_web \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-linux-py3.13
          path: coverage.xml
          retention-days: 14
