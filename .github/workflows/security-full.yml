name: security-full

# Standard `security-full` lane (per
# kaos-modules/docs/oss/40-ci-cd/runner-cost-reduction-plan.md):
# full-history gitleaks + pip-audit on the resolved lock + other
# expensive repository-wide scanners. NOT a PR / main-push lane —
# the cheap incremental variants live in security-light.yml.

on:
  schedule:
    - cron: "0 2 * * 1"  # Mondays at 02:00 UTC
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: security-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gitleaks-full-history:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo \
            zricethezav/gitleaks:latest detect \
            --source /repo \
            --redact \
            --no-banner \
            --verbose \
            --exit-code 1

  pip-audit:
    name: pip-audit (resolved lock)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --group dev --python 3.13

      - name: Export dependency set
        run: uv export --no-hashes --no-emit-project --format requirements-txt > /tmp/requirements.txt

      # Use direct `uvx pip-audit` instead of pypa/gh-action-pip-audit@v1.x.
      # The action runs pip-audit inside a venv whose Python is fixed to the
      # action's bundled 3.10/3.11/3.12, which can't satisfy our Requires-Python
      # >=3.13 dep wheels (kaos-citations, kaos-core, etc.) and exits non-zero
      # with a misleading "No matching distribution" error. uvx honors --python
      # so the dry-install matches what consumers actually do. See
      # kaos-modules/docs/oss/40-ci-cd/security.yml.md (kaos-graph 2026-05-05).
      - name: Run pip-audit
        run: |
          uvx --python 3.13 --from pip-audit pip-audit \
            --requirement /tmp/requirements.txt \
            --strict
