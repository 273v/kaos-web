name: build

# Standard `build` lane (per
# kaos-modules/docs/oss/40-ci-cd/runner-cost-reduction-plan.md):
# build wheel/sdist, `twine check --strict`, clean-venv smoke install.
# Linux Python 3.13 on PR / main push / tag. The release workflow
# (release.yml) is the gated artifact-publish path; this lane is the
# PR-time smoke that the artifact builds cleanly and the wheel
# installs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel and sdist
        run: uv build

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        # Install the actually-built wheel (not the source tree) into a
        # clean Python environment and exercise the public API. This
        # catches packaging bugs that source-tree tests miss: missing
        # data files, broken `__init__.py` exports, sdist-only files
        # that reference dist-only paths, etc.
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_web-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_web
          assert kaos_web.__version__, 'version missing from wheel'
          # Public symbols import without error.
          from kaos_web import (
              extract_content,
              extract_metadata,
              html_to_document,
              register_browser_tools,
              register_crawl_tools,
              register_domain_tools,
              register_web_tools,
          )
          # html_to_document handles a minimal page end-to-end.
          doc = html_to_document(
              '<html><body><article><h1>hi</h1><p>x</p></article></body></html>',
              url='https://example.com/smoke',
          )
          assert len(doc.body) >= 1, 'html_to_document produced no blocks'
          # Runtime container resolves and web tools register.
          from kaos_core import KaosRuntime
          rt = KaosRuntime()
          n = register_web_tools(rt)
          assert n > 0, 'no web tools registered'
          print(f'kaos-web {kaos_web.__version__}: {n} extraction tools registered')
          "
          # Exercise the CLI entrypoint.
          /tmp/smoke/bin/kaos-web --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
