name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 02:00 UTC — re-scan in case a new CVE landed against
    # an existing pinned dependency.
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── gitleaks (CLI, license-free) ──────────────
  # `gitleaks/gitleaks-action@v2` requires a paid license for
  # organization-owned repositories as of late 2025. The gitleaks CLI
  # itself is MIT-licensed and free; we run it directly via the
  # official Docker image so there is no license, no rate limit, and
  # no third-party action in our supply chain for this scan.
  #
  # Rule scope: the default open-source ruleset, plus any project-local
  # overrides in `.gitleaks.toml` and `.gitleaksignore`.
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks (Docker, no license required)
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo \
            zricethezav/gitleaks:latest detect \
            --source /repo \
            --redact \
            --no-banner \
            --verbose \
            --exit-code 1

  # ────────────── pip-audit ──────────────
  # Scan the locked dependency set for known CVEs. PyPA-maintained
  # tooling that consults the Python Packaging Advisory Database (PyPA)
  # plus OSV.
  #
  # We invoke `uvx pip-audit` directly rather than
  # `pypa/gh-action-pip-audit` because the action's bundled interpreter
  # may be older than `kaos-core` / `kaos-web`'s `requires-python` floor
  # (≥3.13), which makes the action's internal venv fail with
  # "No matching distribution found" on a transitive dependency.
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --group dev --python 3.13

      - name: Export installed dependency set to requirements.txt
        # pip-audit reads requirements.txt; uv export gives us the
        # exact resolved set, locked to versions, including
        # transitive dependencies.
        run: uv export --no-hashes --no-emit-project --format requirements-txt > /tmp/requirements.txt

      - name: Run pip-audit
        # Direct `uvx pip-audit` invocation — see the comment on the
        # job for why we don't use `pypa/gh-action-pip-audit`.
        run: |
          uvx --python 3.13 --from pip-audit pip-audit \
            --requirement /tmp/requirements.txt \
            --strict
