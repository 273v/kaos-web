name: scorecard

# Standard `scorecard` lane (per
# kaos-modules/docs/oss/40-ci-cd/runner-cost-reduction-plan.md):
# OpenSSF Scorecard posture signal. NOT a `main` push lane —
# runs weekly, on manual dispatch, and on branch-protection changes.

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 1"  # Mondays at 04:23 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # to upload SARIF to GitHub code scanning
      id-token: write          # to publish provenance attestation
      contents: read           # to read the repo
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7
      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: results.sarif
