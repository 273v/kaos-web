name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── lint ──────────────
  # Separate from tests so format / lint / type failures fail-fast and
  # are easy to spot without combing through test output.
  lint:
    name: Lint
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Ruff format check
        run: uv run ruff format --check kaos_web tests

      - name: Ruff lint
        run: uv run ruff check kaos_web tests

      - name: Type check (ty)
        run: uv run ty check kaos_web tests

  # ────────────── pre-commit ──────────────
  # Catches any drift between the local pre-commit config and the
  # checks above. If a contributor disabled their local hooks, this
  # job still enforces the contract on the PR.
  pre-commit:
    name: Pre-commit hooks
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (needed by the local ty hook)
        run: uv sync --group dev --python 3.13

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  # ────────────── test ──────────────
  test:
    name: Test (${{ matrix.display-os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Linux x64 (self-hosted) keeps the 4-Python-version matrix for
    # fast PR feedback. macOS-arm64 + Windows-x64 each get a single
    # Python 3.13 leg, gated experimental until proven stable.
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.13"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          - python-version: "3.14"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          - python-version: "3.14t"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          # 3.15: blocked on upstream rpds-py.
          #
          # The 3.15 lane has no published rpds-py wheel, so uv
          # source-builds rpds-py==0.30.0. Its Cargo.toml pins
          # `pyo3-ffi 0.27.2`, which caps the supported CPython at
          # 3.14:
          #
          #     error: the configured Python version (3.15) is newer
          #            than PyO3's
          #
          # rpds-py is pulled transitively via `jsonschema` (via
          # `referencing`), which is itself a transitive of several
          # of our base deps — we cannot drop it. The PyO3 release
          # that supports 3.15 is 0.27.3+ / 0.28.x; once rpds-py cuts
          # a release with that floor, the wheel build will resume
          # on Linux 3.15 and this leg will pass.
          #
          # Tracking: https://github.com/crate-py/rpds/blob/main/Cargo.toml
          # (look for the `pyo3` dep version). Re-check on every
          # rpds-py release until it's >= the version that landed
          # PyO3 0.28+. Until then this leg is expected red and is
          # intentionally `experimental: true` /
          # `continue-on-error: true` so the workflow signal stays
          # green on PRs.
          - python-version: "3.15"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          - python-version: "3.13"
            os: macos-14
            display-os: macos-arm64
            experimental: true
          - python-version: "3.13"
            os: windows-latest
            display-os: windows-x64
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: test-${{ matrix.display-os }}-py${{ matrix.python-version }}

      - name: Install Python ${{ matrix.python-version }}
        # `--preview` lets `uv python install` resolve in-development
        # interpreters (3.15) and the free-threaded variant (3.14t).
        # No-op for stable versions.
        run: uv python install --preview ${{ matrix.python-version }}

      - name: Install system build deps (lxml needs libxml2/libxslt headers)
        # lxml ships pre-built wheels for stable cp3.X releases. For
        # pre-release Pythons (currently 3.15) and the free-threaded
        # variant (3.14t), wheels may not exist yet and uv falls back
        # to a source build. Install the headers so the source build
        # actually works rather than failing the whole matrix entry.
        # Cheap (~5s); skip on non-Linux runners if we ever add them.
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libxml2-dev libxslt1-dev

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        # `shell: bash` for `\` continuations on Windows.
        shell: bash
        run: |
          uv run pytest \
            -m "not live and not network and not slow and not integration" \
            --cov=kaos_web \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always() && !matrix.experimental
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.display-os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ────────────── min-deps ──────────────
  # Resolve and test against the minimum declared versions of every
  # dependency so we catch "we said >=X but actually need X+1" drift.
  # Runs on 3.13 only; 3.14 is the cutting edge and may not have wheels
  # for very old dep versions.
  min-deps:
    name: Test against minimum dependencies
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install with lowest-direct resolution
        run: uv sync --group dev --resolution=lowest-direct --python 3.13

      - name: Run tests
        run: |
          uv run pytest \
            -m "not live and not network and not slow and not integration" \
            --no-cov \
            -q

  # ────────────── build + wheel smoke test ──────────────
  build:
    name: Build distribution + smoke test
    runs-on: kaos-x64-16core
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel + sdist
        run: uv build

      - name: Verify metadata (twine check)
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        # Install the actually-built wheel (not the source tree) into a
        # clean Python environment and exercise the public API. This
        # catches packaging bugs that source-tree tests miss: missing
        # data files, broken `__init__.py` exports, sdist-only files
        # that reference dist-only paths, etc.
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_web-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_web
          assert kaos_web.__version__, 'version missing from wheel'
          # Public symbols import without error.
          from kaos_web import (
              extract_content,
              extract_metadata,
              html_to_document,
              register_browser_tools,
              register_crawl_tools,
              register_domain_tools,
              register_web_tools,
          )
          # html_to_document handles a minimal page end-to-end.
          doc = html_to_document(
              '<html><body><article><h1>hi</h1><p>x</p></article></body></html>',
              url='https://example.com/smoke',
          )
          assert len(doc.body) >= 1, 'html_to_document produced no blocks'
          # Runtime container resolves and web tools register.
          from kaos_core import KaosRuntime
          rt = KaosRuntime()
          n = register_web_tools(rt)
          assert n > 0, 'no web tools registered'
          print(f'kaos-web {kaos_web.__version__}: {n} extraction tools registered')
          "
          # Exercise the CLI entrypoint.
          /tmp/smoke/bin/kaos-web --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
