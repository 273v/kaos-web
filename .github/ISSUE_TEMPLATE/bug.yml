name: Bug report
description: Report a defect in kaos-web
title: "[bug] "
labels: ["type:bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include any error messages or stack traces.
      placeholder: When I call X with Y, Z happens instead of W.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Minimal code or commands that reproduce the bug.
      render: python
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: kaos-web version
      description: Output of `python -c "import kaos_web; print(kaos_web.__version__)"`
      placeholder: e.g. 0.1.0a1
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: e.g. 3.13.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 24.04, macOS 15.4
    validations:
      required: true

  - type: input
    id: extras
    attributes:
      label: Installed extras
      description: Which extras are installed (e.g. `[browser]`, `[dns]`, `[mcp]`, `[nlp]`, or none)?
      placeholder: e.g. browser, dns

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help.
